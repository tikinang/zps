node1:
  build:
    build:
      - echo "building"
    deploy: [elasticsearch.yml]
  run:
    prepare:
      - echo "93c0fc8b-7e66-4d25-bbcc-22823ab0d079" # random thing, so prepare is activated
      - apt-get update
      - apt-get install -y openssh-server
      - systemctl enable ssh
      - systemctl start ssh
      - mkdir -p ~/.ssh
      - echo "$SSH_PUBLIC_KEYS" > ~/.ssh/authorized_keys
      - wget -qO - https://artifacts.elastic.co/GPG-KEY-elasticsearch | sudo gpg --dearmor -o /usr/share/keyrings/elasticsearch-keyring.gpg
      - apt-get install apt-transport-https
      - echo "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.gpg] https://artifacts.elastic.co/packages/8.x/apt stable main" | sudo tee /etc/apt/sources.list.d/elastic-8.x.list
      - apt-get update
      - apt-get install elasticsearch
      - systemctl daemon-reload
      - systemctl enable elasticsearch
    init:
      - systemctl stop zerops-prepare
      - systemctl mask zerops-prepare
      - mv elasticsearch.yml > /etc/elasticsearch/elasticsearch.yml
      - systemctl start elasticsearch
    start: while true; do echo "running"; sleep 5s; done
    envReplace:
      target: [/etc/elasticsearch/elasticsearch.yml]
      delimiter: ["%%"]
